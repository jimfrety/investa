databases:
  - name: investa-postgres
    databaseName: investa_db
    user: investa_user
    plan: basic-256mb

services:
  # 1. Spring Boot Backend Service (Docker container)
  - type: web
    name: investa-backend
    runtime: docker
    rootDir: backend
    plan: starter
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: investa-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: investa-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: investa-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: investa-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: investa-postgres
          property: password
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_DDL_AUTO
        value: update
      - key: INVESTA_EXCEL_PATH
        value: Forecast.xlsx
      - key: INVESTA_FRONTEND_URL
        sync: false

  # 2. React Frontend Static Site
  - type: web
    name: investa-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
