spring.application.name=investa-backend
server.port=8080

# Database Configurations (Dynamic env fallback to H2)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/investa;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Investa application properties
investa.excel.path=${INVESTA_EXCEL_PATH:../Forecast.xlsx}

# OpenAI Config
openai.api.key=${OPENAI_API_KEY:}

# Gemini Config
gemini.api.key=${GEMINI_API_KEY:}

# Enable CORS for React frontend (localhost:5173 / localhost:3000)
# Custom mapping done in WebMvcConfigurer config
