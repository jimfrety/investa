spring.application.name=investa-backend
server.port=${PORT:8080}

# Database Configurations
# On Render: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD are injected from the managed Postgres service
# Locally: falls back to H2 in-file database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/investa;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create}
spring.jpa.show-sql=false

# Investa application properties
investa.excel.path=${INVESTA_EXCEL_PATH:Forecast.xlsx}

# OpenAI Config
openai.api.key=${OPENAI_API_KEY:}

# Gemini Config
gemini.api.key=${GEMINI_API_KEY:}

# Enable CORS for React frontend (localhost:5173 / localhost:3000)
# Custom mapping done in WebMvcConfigurer config
investa.cors.allowed-origins=${INVESTA_FRONTEND_URL:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}
